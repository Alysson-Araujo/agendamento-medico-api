server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/medical_scheduling
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: c2VjcmV0LWtleS1mb3ItbWVkaWNhbC1zY2hlZHVsaW5nLWFwaS1qd3QtdG9rZW4tc2lnbmluZw==
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
